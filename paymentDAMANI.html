<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="colors.css" />
    <link rel="stylesheet" href="paymentDAMANI.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
    <!--WEBSITE CONTAINER-->
    <div class="website-container">
        <!--HEADER-->
        <div class="mobile-header">
            <div class="dark-mode-toggle">
                <div class="dark-mode-switch"></div>
            </div>
            <a href="home.html" class="mobile-home-btn">Home</a>
            <a href="searchDAMANI.html" class="mobile-explore-btn">Explore</a>
            <a href="about.html" class="mobile-about-btn">About</a>
            <div class="mobile-search-wrapper">
                <button class="mobile-search-submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <input type="text" class="mobile-search" placeholder="find a creator" />
            </div>
            <a href="accountDAMANI.html" class="mobile-account-btn">My account</a>
        </div>
        <!--MAIN PAYMENT-->
        <main class="payment-section">
            <section class="purchase-settings">
                <h2 class="select-payment-message">Select Payment Type</h2>
                <div class="payment-methods">
                    <button class="payment-method-btn">PayPal</button>
                    <button class="payment-method-btn">Credit Card</button>
                    <button class="payment-method-btn">Apple Pay</button>
                </div>
                <div class="amount-row">
                    <span class="amount-label">Amount due</span>
                    <div class="amount-box" id="amountDue">$3</div>
                </div>
            </section>
            <section class="payment-form">
                <div class="payment-inputs">
                    <input type="text" id="cardNumber" placeholder="Card number" />
                    <input type="text" id="cvv" placeholder="CVV" />
                    <input type="text" id="zipCode" placeholder="Zip code" />
                    <button class="confirm-btn" id="confirmBtn" type="button">Pay Now</button>
                </div>
            </section>
        </main>
        <footer class="website-footer">Developed by the members of Group 14</footer>
    </div>
</body>
</html>
