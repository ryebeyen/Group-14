<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="payment.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>

  <div class="app-container">

    <header class="payment-top-bar">
      <div class="payment-user">
        <img src="https://via.placeholder.com/52" alt="User avatar" class="payment-user-avatar">
        <span class="payment-username">User123</span>
      </div>
    </header>

    <main class="payment-page">

  <a href="membership.html" class="payment-back-link">
    <i class="fa-solid fa-arrow-left"></i> Back
  </a>

  <div class="payment-divider"></div>

  
  <section class="payment-details">
    <h2>Choose payment method</h2>
    <div class="payment-methods">
      <button class="payment-method-btn">PayPal</button>
      <button class="payment-method-btn">Credit Card</button>
      <button class="payment-method-btn">Apple Pay</button>
    </div>
    <div class="amount-row">
      <span class="amount-label">Amount due</span>
      <div class="amount-box" id="amountDue">$3</div>
    </div>
  </section>

  
  <div class="payment-form">
    <input type="text" id="cardNumber" placeholder="Card number" />
    <input type="text" id="cvv" placeholder="CVV" />
    <input type="text" id="zipCode" placeholder="Zip code" />
    <button class="confirm-btn" id="confirmBtn" type="button">Pay Now</button>
  </div>

</main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
      <a href="search.html" class="nav-icon"><i class="fa-solid fa-magnifying-glass"></i></a>
      <a href="notifications.html" class="nav-icon"><i class="fa-regular fa-bell"></i></a>
      <a href="account.html" class="nav-icon active"><i class="fa-regular fa-user"></i></a>
    </nav>

  </div>

  <!-- POPUP BACKDROP -->
  <div class="popup-backdrop hidden" id="popupBackdrop">
    <div class="popup-box" id="popupBox">
      <p id="popupMessage">Please wait a moment...</p>
      <button class="popup-close hidden" id="popupClose">X</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const amount = params.get("amount");
    const amountDue = document.getElementById("amountDue");

    if (amount === "3" || amount === "5" || amount === "10") {
      amountDue.textContent = `$${amount}`;
    }

    const confirmBtn = document.getElementById("confirmBtn");
    const cardNumber = document.getElementById("cardNumber");
    const cvv = document.getElementById("cvv");
    const zipCode = document.getElementById("zipCode");

    const popupBackdrop = document.getElementById("popupBackdrop");
    const popupBox = document.getElementById("popupBox");
    const popupMessage = document.getElementById("popupMessage");
    const popupClose = document.getElementById("popupClose");

    let popupMode = "loading";

    function isOnlyNumbers(value) {
      return /^\d+$/.test(value);
    }

    function showPopup(message, mode) {
      popupMode = mode;
      popupMessage.innerHTML = message;
      popupBackdrop.classList.remove("hidden");
      popupClose.classList.toggle("hidden", mode === "loading");

      popupBox.classList.remove("loading-popup", "error-popup", "success-popup");

      if (mode === "loading") {
        popupBox.classList.add("loading-popup");
      } else if (mode === "error") {
        popupBox.classList.add("error-popup");
      } else if (mode === "success") {
        popupBox.classList.add("success-popup");
      }
    }

    function hidePopup() {
      popupBackdrop.classList.add("hidden");
    }

    function validateInputs() {
      const cardValue = cardNumber.value.trim();
      const cvvValue = cvv.value.trim();
      const zipValue = zipCode.value.trim();

      const cardValid = isOnlyNumbers(cardValue) && cardValue.length === 16;
      const cvvValid = isOnlyNumbers(cvvValue) && cvvValue.length === 3;
      const zipValid = isOnlyNumbers(zipValue) && zipValue.length === 5;

      return cardValid && cvvValid && zipValid;
    }

    function runLoadingThenResult() {
      const loadingFrames = [
        "Please wait a moment...",
        "Please wait a moment...<br><br>—",
        "Please wait a moment...<br><br>——",
        "Please wait a moment...<br><br>———",
        "Please wait a moment...<br><br>————"
      ];

      let frameIndex = 0;
      showPopup(loadingFrames[0], "loading");

      const interval = setInterval(() => {
        frameIndex++;
        if (frameIndex < loadingFrames.length) {
          popupMessage.innerHTML = loadingFrames[frameIndex];
        } else {
          clearInterval(interval);

          if (validateInputs()) {
            showPopup("Thank you for your purchase.", "success");
          } else {
            showPopup("Sorry please complete the above requirements.", "error");
          }
        }
      }, 200);
    }

    confirmBtn.addEventListener("click", function () {
      runLoadingThenResult();
    });

    popupBackdrop.addEventListener("click", function (e) {
      if (e.target === popupBackdrop && popupMode !== "loading") {
        hidePopup();
      }
    });

    popupClose.addEventListener("click", function () {
      hidePopup();
    });
  </script>

</body>
</html>
