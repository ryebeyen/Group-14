<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Membership</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="membership.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>

  <div class="app-container">

    <header class="membership-top-bar">
      <div class="membership-user">
        <img src="https://via.placeholder.com/52" alt="User avatar" class="membership-user-avatar">
        <span class="membership-username">User123</span>
      </div>

      <a href="profile.html" class="membership-back-link">
        <i class="fa-solid fa-arrow-left"></i> Back
      </a>
    </header>

    <main class="membership-page">

      <section class="membership-tier-card">
        <h2>$3/month</h2>
        <a href="payment.html?amount=3" class="purchase-btn">Purchase</a>
        <ul>
          <li>Unlocks all content</li>
        </ul>
      </section>

      <section class="membership-tier-card">
        <h2>$5/month</h2>
        <a href="payment.html?amount=5" class="purchase-btn">Purchase</a>
        <ul>
          <li>Personal shout out + previous rewards</li>
        </ul>
      </section>

      <section class="membership-tier-card">
        <h2>$10/month</h2>
        <a href="payment.html?amount=10" class="purchase-btn">Purchase</a>
        <ul>
          <li>My eternal gratitude + previous rewards</li>
        </ul>
      </section>

    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
      <a href="search.html" class="nav-icon"><i class="fa-solid fa-magnifying-glass"></i></a>
      <a href="notifications.html" class="nav-icon"><i class="fa-regular fa-bell"></i></a>
      <a href="account.html" class="nav-icon active"><i class="fa-regular fa-user"></i></a>
    </nav>

  </div>

</body>
</html>
