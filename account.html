<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account</title>

  <link rel="stylesheet" href="account.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="app-container">

  <!-- DESKTOP HEADER -->
  <header class="desktop-header">
    <span class="desktop-logo">
      Patreon <span class="logo-divider">|</span>
    </span>
    <input type="text" class="desktop-search" placeholder="Search |">
    <div class="desktop-header-icons">
      <div class="icon-placeholder bell">🔔</div>
      <div class="icon-placeholder me">ME</div>
    </div>
  </header>

  <!-- TOP HEADER -->
  <header class="top-header">
    <h1>Patreon</h1>
  </header>

  <!-- MAIN -->
  <main class="account-page">

    <div class="account-card">

      <h2>Account Information</h2>

      <div class="profile-picture-preview">
        <span class="profile-placeholder">ME</span>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" placeholder="Enter Username">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="text" placeholder="Enter Email">
      </div>

      <div class="form-group">
        <label>New Password</label>
        <input type="text" placeholder="Enter Password">
      </div>

      <div class="account-bottom-row">
        <button class="save-btn" onclick="showUpdatePopup()">Save</button>

        <div class="theme-box">
          <span class="theme-label">Color theme</span>
          <div class="theme-toggle" onclick="toggleDarkMode()">
            <div class="toggle-circle"></div>
          </div>
        </div>
      </div>

    </div>

  </main>

  <!-- NAV -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
    <a href="search.html" class="nav-icon"><i class="fa-solid fa-magnifying-glass"></i></a>
    <a href="notifications.html" class="nav-icon"><i class="fa-regular fa-bell"></i></a>
    <a href="account.html" class="nav-icon active"><i class="fa-regular fa-user"></i></a>
  </nav>

</div>

<!-- POPUP -->
<div id="updatePopup" class="update-popup-overlay">
  <div class="update-popup-box">
    <button class="update-popup-close" onclick="closeUpdatePopup()">×</button>
    <div class="update-popup-message">Update complete</div>
  </div>
</div>

<!-- SCRIPT -->
<script>
  function showUpdatePopup() {
    document.getElementById("updatePopup").style.display = "flex";
  }

  function closeUpdatePopup() {
    document.getElementById("updatePopup").style.display = "none";
  }

  function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
      localStorage.setItem("theme", "dark");
    } else {
      localStorage.setItem("theme", "light");
    }
  }

  window.onload = function () {
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark-mode");
    }
  };
</script>

</body>
</html>
