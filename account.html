<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account</title>
  <!--
  <link rel="stylesheet" href="style.css">
  -->
  <link rel="stylesheet" href="account.css" />
  <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="app-container">

  <!--DESKTOP HEADER: DEFAULT HIDDEN-->
  <header class="desktop-header">
    <a href="index.html">
      <span class="desktop-logo">
        Patreon <span class="logo-divider">|</span>
      </span>
    </a>
  
    <div class="desktop-search-wrapper">
      <input
        type="text"
        class="desktop-search"
        id="desktopSearchInput"
        placeholder="Search |"
        autocomplete="off"
      />
  
      <div class="desktop-search-overlay hidden" id="desktopSearchOverlay">
        <div class="search-overlay-section">
          <p class="overlay-label">Recent searches</p>
          <div id="desktopRecentResults"></div>
        </div>
  
        <div class="overlay-divider"></div>
  
        <div class="search-overlay-section">
          <div id="desktopSuggestionResults"></div>
        </div>
      </div>
    </div>
  
    <div class="desktop-header-icons">
      <div class="icon-placeholder bell">🔔</div>
      <a href="account.html">
        <div class="icon-placeholder me">ME</div>
      </a>
    </div>
  </header>

  <main class="account-page">

    <div class="account-card">

      <h2>Account Information</h2>

      <div class="profile-picture-preview">
        <span class="profile-placeholder">ME</span>
      </div>

      <div class="form-group">
        <label>Update username</label>
        <input type="text" placeholder="Enter Username">
      </div>

      <div class="form-group">
        <label>Update email</label>
        <input type="text" placeholder="Enter Email">
      </div>

      <div class="form-group">
        <label>Update password</label>
        <input type="text" placeholder="Enter Password">
      </div>

      <div class="account-bottom-row">
        <button class="save-btn">Save</button>

        <div class="theme-box">
          <span class="theme-label">Color theme</span>
          <div class="theme-toggle">
            <div class="toggle-circle"></div>
          </div>
        </div>
      </div>

    </div>

  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
    <a href="search.html" class="nav-icon"><i class="fa-solid fa-magnifying-glass"></i></a>
    <a href="notifications.html" class="nav-icon"><i class="fa-regular fa-bell"></i></a>
    <a href="account.html" class="nav-icon active"><i class="fa-regular fa-user"></i></a>
  </nav>

</div>
<script src="searchbarFunction.js"></script>
</body>
</html>
