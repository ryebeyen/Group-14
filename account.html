<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account</title>

  <link rel="stylesheet" href="account.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="app-container">

  <!-- DESKTOP HEADER -->
  <header class="desktop-header">
    <a href="index.html">
        <span class="desktop-logo">Patreon <span class="logo-divider">|</span></span>
    </a>

    <div class="desktop-search-wrapper">
        <input type="text" class="desktop-search" id="desktopSearchInput" placeholder="Search |" autocomplete="off" />
        <div class="desktop-search-overlay hidden" id="desktopSearchOverlay">
            <div class="search-overlay-section">
                <p class="overlay-label">Recent searches</p>
                <div id="desktopRecentResults"></div>
            </div>
            <div class="overlay-divider"></div>
            <div class="search-overlay-section">
                <div id="desktopSuggestionResults"></div>
            </div>
        </div>
    </div>

    <div class="nav-tab-wrapper">
        <div class="nav-tab">Home</div>
        <div class="nav-tab">Explore</div>
        <div class="nav-tab">About</div>
    </div>

    <div class="desktop-header-icons">
        <div class="icon-placeholder bell">🔔</div>
        <a href="account.html">
            <div class="icon-placeholder me">ME</div>
        </a>
    </div>
</header>

<div class="notification-overlay hidden" id="desktopNotificationOverlay">
  <div class="notification-label-wrapper">
    <span class="notification-label">Notifications</span>
    <span class="notification-date">Date</span>
  </div>

  <a href="profile.html?creator=echoverse" class="notification-link">
    <div class="notification-item">
      <img
        src="https://images.unsplash.com/photo-1464802686167-b939a6910659"
        class="notif-avatar"
        alt="creator"
      />
      <div class="notif-text">
        <span class="notif-name">echoverse</span>
        <span class="notif-action">Made an announcement</span>
      </div>
      <span class="notif-time">Today</span>
    </div>
  </a>

  <a href="profile.html?creator=motiondistrict" class="notification-link">
    <div class="notification-item">
      <img
        src="https://images.unsplash.com/photo-1496171367470-9ed9a91ea931"
        class="notif-avatar"
        alt="creator"
      />
      <div class="notif-text">
        <span class="notif-name">Motiondistrict</span>
        <span class="notif-action">Made an announcement</span>
      </div>
      <span class="notif-time">Yesterday</span>
    </div>
  </a>

  <a href="profile.html?creator=creator001" class="notification-link">
    <div class="notification-item">
      <img
        src="https://images.unsplash.com/photo-1513364776144-60967b0c78f"
        class="notif-avatar"
        alt="creator"
      />
      <div class="notif-text">
        <span class="notif-name">Creator001</span>
        <span class="notif-action">Posted</span>
      </div>
      <span class="notif-time">Last week</span>
    </div>
  </a>

  <a href="profile.html?creator=atlascollective" class="notification-link">
    <div class="notification-item">
      <img
        src="https://images.unsplash.com/photo-1499092346589-b9b6be3e94b2"
        class="notif-avatar"
        alt="creator"
      />
      <div class="notif-text">
        <span class="notif-name">AtlasCollective</span>
        <span class="notif-action">Made an announcement</span>
      </div>
      <span class="notif-time">Last week</span>
    </div>
  </a>
</div>
  
  <!-- TOP HEADER -->
  <header class="top-header">
    <h1>Patreon</h1>
  </header>

  <!-- MAIN -->
  <main class="account-page">

    <div class="account-card">

      <h2>Account Information</h2>

      <div class="profile-picture-preview">
        <span class="profile-placeholder">ME</span>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" placeholder="Enter Username">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="text" placeholder="Enter Email">
      </div>

      <div class="form-group">
        <label>New Password</label>
        <input type="text" placeholder="Enter Password">
      </div>

      <div class="account-bottom-row">
        <button class="save-btn" onclick="showUpdatePopup()">Save</button>

        <div class="theme-box">
          <span class="theme-label">Color theme</span>
          <div class="theme-toggle" onclick="toggleDarkMode()">
            <div class="toggle-circle"></div>
          </div>
        </div>
      </div>

    </div>

  </main>

  <!-- NAV -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
    <a href="search.html" class="nav-icon"><i class="fa-solid fa-magnifying-glass"></i></a>
    <a href="notifications.html" class="nav-icon"><i class="fa-regular fa-bell"></i></a>
    <a href="account.html" class="nav-icon active"><i class="fa-regular fa-user"></i></a>
  </nav>

</div>

<!-- POPUP -->
<div id="updatePopup" class="update-popup-overlay">
  <div class="update-popup-box">
    <button class="update-popup-close" onclick="closeUpdatePopup()">&times;</button>
    <div class="update-popup-message">Update complete</div>
  </div>
</div>

<script src="searchbarFunction.js"></script>
  
<!-- SCRIPT -->
<script>
  const updatePopup = document.getElementById("updatePopup");

  function showUpdatePopup() {
    updatePopup.style.display = "flex";
  }

  function closeUpdatePopup() {
    updatePopup.style.display = "none";
  }

  function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
      localStorage.setItem("theme", "dark");
    } else {
      localStorage.setItem("theme", "light");
    }
  }

  updatePopup.addEventListener("click", function (event) {
    if (event.target === updatePopup) {
      closeUpdatePopup();
    }
  });

  window.onload = function () {
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark-mode");
    }
  };
</script>

</body>
</html>
