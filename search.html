<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search</title>
  <link rel="stylesheet" href="search.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>
  <div class="app-container">

    <div class="app-container">

  <!-- DESKTOP HEADER -->
  <header class="desktop-header">
    <a href="index.html" class="desktop-logo-link">
      <span class="desktop-logo">
        Patreon <span class="logo-divider">|</span>
      </span>
    </a>
    <div class="nav-tab-wrapper">
      <a href="index.html"><div class="nav-tab">Home</div></a>
      <a href="search.html"><div class="nav-tab">Explore</div></a>
      <a href="about.html"><div class="nav-tab">About</div></a>
    </div>
    <div class="desktop-header-icons">
      <button class="icon-placeholder bell notification-bell-btn" id="desktopBellBtn" type="button" aria-label="Notifications">🔔</button>
      <a href="account.html">
        <div class="icon-placeholder me">ME</div>
      </a>
    </div>
  </header>

  <!-- MOBILE HEADER -->
  <header class="top-header">
    <h1>Patreon</h1>
  </header>

  <!-- SHARED HOME SEARCH AREA -->
  <div class="home-search-area">
    <div class="search-bar-row">
      <input
        type="text"
        class="search-input"
        placeholder="Search |"
        id="searchInput"
        autocomplete="off"
      />
      <button class="search-submit-btn" type="button">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </div>
    <div class="search-overlay hidden" id="searchOverlay">
      <div class="search-overlay-section">
        <p class="overlay-label">Recent searches</p>
        <div id="recentResults"></div>
      </div>
      <div class="overlay-divider"></div>
      <div class="search-overlay-section">
        <div id="suggestionResults"></div>
      </div>
    </div>
  </div>

  <!-- DESKTOP FILTER -->
  <div class="filter-bar">
    <button class="filter-btn">All</button>
    <button class="filter-btn">Gaming</button>
    <button class="filter-btn">Music</button>
    <button class="filter-btn">Sports</button>
    <button class="filter-btn">Anime</button>
    <button class="filter-btn">Art</button>
    <button class="filter-btn">Gacha</button>
  </div>
    <main class="search-page">
      <section class="search-section">
        <h3 class="search-section-title">New Content&gt;</h3>

        <div class="search-grid" id="newForYouGrid">
          <div class="search-card" data-name="frameforge">
            <a href="profile.html?creator=frameforge" class="search-link">
              <img
                src="https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=500&q=80"
                alt="FrameForge"
                class="search-card-image"
              />
              <h4>FrameForge</h4>
              <p>Short Films</p>
            </a>
          </div>

          <div class="search-card" data-name="creator001">
            <a href="profile.html?creator=creator001" class="search-link">
              <img
                src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&w=500&q=80"
                alt="Creator001"
                class="search-card-image"
              />
              <h4>Creator001</h4>
              <p>Art Tutorials</p>
            </a>
          </div>

          <div class="search-card" data-name="wordhaven">
            <a href="profile.html?creator=wordhaven" class="search-link">
              <img
                src="https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=500&q=80"
                alt="WordHaven"
                class="search-card-image"
              />
              <h4>WordHaven</h4>
              <p>Poetry</p>
            </a>
          </div>

          <div class="search-card" data-name="pixelbrew">
            <a href="profile.html?creator=pixelbrew" class="search-link">
              <img
                src="https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=500&q=80"
                alt="PixelBrew"
                class="search-card-image"
              />
              <h4>PixelBrew</h4>
              <p>Gaming Clips</p>
            </a>
          </div>
        </div>
      </section>

      <section class="search-section popular-week-section">

        <div class="search-grid" id="popularGrid">
          <div class="search-card" data-name="atlascollective">
            <a href="profile.html?creator=atlascollective" class="search-link">
              <img
                src="https://images.unsplash.com/photo-1530521954074-e64f6810b32d?auto=format&fit=crop&w=500&q=80"
                alt="AtlasCollective"
                class="search-card-image"
              />
              <h4>AtlasCollective</h4>
              <p>Travel</p>
            </a>
          </div>

          <div class="search-card" data-name="echoverse">
            <a href="profile.html?creator=echoverse" class="search-link">
              <img
                src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=500&q=80"
                alt="Echoverse"
                class="search-card-image"
              />
              <h4>Echoverse</h4>
              <p>Storytelling</p>
            </a>
          </div>

          <div class="search-card" data-name="urbanflux">
            <a href="profile.html?creator=urbanflux" class="search-link">
              <img
                src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=500&q=80"
                alt="UrbanFlux"
                class="search-card-image"
              />
              <h4>UrbanFlux</h4>
              <p>Fashion</p>
            </a>
          </div>

          <div class="search-card" data-name="motiondistrict">
            <a href="profile.html?creator=motiondistrict" class="search-link">
              <img
                src="https://images.unsplash.com/photo-1587614382346-4ec70e388b28?auto=format&fit=crop&w=500&q=80"
                alt="MotionDistrict"
                class="search-card-image"
              />
              <h4>MotionDistrict</h4>
              <p>Video Editing</p>
            </a>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-icon">
        <i class="fa-solid fa-house"></i>
      </a>
      <a href="search.html" class="nav-icon active">
        <i class="fa-solid fa-magnifying-glass"></i>
      </a>
      <a href="notifications.html" class="nav-icon">
        <i class="fa-regular fa-bell"></i>
      </a>
      <a href="account.html" class="nav-icon">
        <i class="fa-regular fa-user"></i>
      </a>
    </nav>
  </div>

  <script src="searchbarFunction.js"></script>

  <script>
    window.onload = function () {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
      }
    };
  </script>
</body>
</html>
