<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="colors.css" />
    <link rel="stylesheet" href="accountDAMANI.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
    <div class="website-container">
        <div class="mobile-header">
            <div class="dark-mode-toggle">
                <div class="dark-mode-switch"></div>
            </div>
            <a href="home.html" class="mobile-home-btn">Home</a>
            <a href="searchDAMANI.html" class="mobile-explore-btn">Explore</a>
            <a href="about.html" class="mobile-about-btn">About</a>
            <div class="mobile-search-wrapper">
                <button class="mobile-search-submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <input type="text" class="mobile-search" placeholder="find a creator" />
            </div>
            <a href="" class="mobile-account-btn">My account</a>
        </div>
        <main class="account-settings">
            <div class="account-card">
                <h2>Account Information</h2>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" placeholder="Enter Username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" placeholder="Enter Email">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="text" placeholder="Enter Password">
                </div>

                <div class="account-bottom-row">
                    <button class="save-btn" onclick="showUpdatePopup()">Save</button>
                </div>
            </div>
        </main>
        <footer class="website-footer">Developed by the members of Group 14</footer>
    </div>
</body>
<script src="darkMode.js"></script>
</html>
